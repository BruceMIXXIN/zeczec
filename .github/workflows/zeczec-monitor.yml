name: Zeczec Monitor

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch: {}

concurrency:
  group: zeczec-monitor
  cancel-in-progress: true

jobs:
  run:
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 20
    env:
      ZECZEC_HEARTBEAT_WEBHOOK: ${{ secrets.ZECZEC_HEARTBEAT_WEBHOOK }}
      ALWAYS_SUMMARY_NOTIFY: "1"
      ALERT_WEBHOOK_URL: "https://chat.googleapis.com/v1/spaces/AAQAnGrXo8k/messages?key=AIzaSyDdI0hCZtE6vySjMm-WEfRq3CPzqKqqsHI&token=RL7E9GzW0A34pxNFxHviwOGI9-V4DakpCpdYO1pjkiU"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Python
        run: |
          python3 --version

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Write service account file
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          python3 - <<'PY'
          import os
          import json
          payload = os.environ.get("SERVICE_ACCOUNT_JSON", "")
          if not payload:
              raise SystemExit("Missing SERVICE_ACCOUNT_JSON secret")
          # Support either raw JSON or base64-encoded JSON
          try:
              data = json.loads(payload)
          except json.JSONDecodeError:
              import base64
              data = json.loads(base64.b64decode(payload).decode("utf-8"))
          with open("service_account.json", "w", encoding="utf-8") as f:
              json.dump(data, f)
          print("Wrote service_account.json")
          PY

      - name: Run monitor once
        run: |
          python3 zeczec_sheet_monitorNN.py --once
