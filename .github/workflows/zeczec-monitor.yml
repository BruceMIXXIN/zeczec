name: Zeczec Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: self-hosted
    env:
      HOME: /Users/bruce
      RUNNER_TEMP: /Users/bruce/actions-runner2/_work/_temp
      RUNNER_TOOL_CACHE: /Users/bruce/actions-runner2/_work/_toolcache
      AGENT_TOOLSDIRECTORY: /Users/bruce/actions-runner2/_work/_toolcache
    steps:
      - name: Prepare toolcache
        run: |
          mkdir -p /Users/bruce/actions-runner2/_work/_temp
          mkdir -p /Users/bruce/actions-runner2/_work/_toolcache

      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Python
        run: |
          python3 --version

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Write service account file
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
        run: |
          python3 - <<'PY'
          import os
          import json
          payload = os.environ.get("SERVICE_ACCOUNT_JSON", "")
          if not payload:
              raise SystemExit("Missing SERVICE_ACCOUNT_JSON secret")
          # Support either raw JSON or base64-encoded JSON
          try:
              data = json.loads(payload)
          except json.JSONDecodeError:
              import base64
              data = json.loads(base64.b64decode(payload).decode("utf-8"))
          with open("service_account.json", "w", encoding="utf-8") as f:
              json.dump(data, f)
          print("Wrote service_account.json")
          PY

      - name: Run monitor once
        run: |
          python3 zeczec_sheet_monitorNN.py --once
